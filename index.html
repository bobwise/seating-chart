<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Free Seating Chart Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app">
        <h1>Free Seating Chart Generator</h1>

        <div class="panel">
            <label for="names">Names</label>
            <button class="delete hidden" id="clear">Clear</button>
            <textarea id="names"></textarea>
        </div>

        <div class="panel controls">
            <div>
                <button id="go">Go</button>
            </div>
            <div>
                <label class="hidden">Rows <input id="rows" type="number" min="1" max="8" value="1"></label>
                <label class="hidden">Columns <input id="cols" type="number" min="1" max="8" value="1"></label>
                <input id="podSize" type="hidden" value="1">
                <div class="pod-size-toggle" aria-label="Pod size">
                    <button type="button" class="pod-option active" data-pod-size="1" aria-pressed="true"
                        title="Pod size 1">
                        <div class="seat">
                            <div class="pod">
                                <div class="desk">
                                    <div class="desk-seat" data-desk="0"><span class="name"
                                            style="white-space: normal; font-size: 18px;"></span></div>
                                </div>
                            </div>
                        </div>
                    </button>
                    <button type="button" class="pod-option" data-pod-size="2" aria-pressed="false" title="Pod size 2">
                        <div class="seat">
                            <div class="pod">
                                <div class="desk">
                                    <div class="desk-seat" data-desk="0"><span class="name"
                                            style="white-space: normal; font-size: 18px;"></span></div>
                                </div>
                                <div class="desk">
                                    <div class="desk-seat" data-desk="1"><span class="name"
                                            style="white-space: normal; font-size: 18px;"></span></div>
                                </div>
                            </div>
                        </div>
                    </button>
                    <button type="button" class="pod-option" data-pod-size="4" aria-pressed="false" title="Pod size 4">
                        <div class="seat">
                            <div class="pod pod-square">
                                <div class="desk">
                                    <div class="desk-seat" data-desk="0"><span class="name"
                                            style="white-space: normal; font-size: 18px;"></span></div>
                                </div>
                                <div class="desk">
                                    <div class="desk-seat" data-desk="1"><span class="name"
                                            style="white-space: normal; font-size: 18px;"></span></div>
                                </div>
                                <div class="desk">
                                    <div class="desk-seat" data-desk="2"><span class="name"
                                            style="white-space: normal; font-size: 18px;"></span></div>
                                </div>
                                <div class="desk">
                                    <div class="desk-seat" data-desk="3"><span class="name"
                                            style="white-space: normal; font-size: 18px;"></span></div>
                                </div>
                            </div>
                        </div>
                    </button>
                </div>
            </div>
            <div>
                <button class="hidden" id="shuffle">Shuffle</button>
                <button class="hidden" id="print">Print</button>
            </div>
        </div>

        <div id="chartWrapper" class="panel hidden">
            <div id="chart" class="chart"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
