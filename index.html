<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Free Seating Chart Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app">
        <h1>Free Seating Chart Generator</h1>

        <div class="panel">
            <div id="clearContainer">
                <label for="names" id="namesLabel">Names</label>
                <button type="button" class="btn-delete hidden" id="clear">Clear</button>
            </div>
            <textarea id="names"></textarea>
        </div>

        <div class="panel controls hidden">
            <div>
                <button type="button" class="hidden btn-secondary" id="shuffle" title="Shuffle">Shuffle</button>
            </div>
            <div>
                <label class="hidden">Rows <input id="rows" type="number" min="1" max="8" value="1"></label>
                <label class="hidden">Columns <input id="cols" type="number" min="1" max="8" value="1"></label>
                <input id="podSize" type="hidden" value="1">
                <div class="pod-size-toggle hidden" aria-label="Pod size">
                    <button type="button" class="pod-option active" data-pod-size="1" aria-pressed="true"
                        title="Pod size 1">
                        <div class="seat">
                            <div class="pod">
                                <div class="desk">
                                    <div class="desk-seat" data-desk="0"></div>
                                </div>
                            </div>
                        </div>
                    </button>
                    <button type="button" class="pod-option" data-pod-size="2" aria-pressed="false" title="Pod size 2">
                        <div class="seat">
                            <div class="pod">
                                <div class="desk">
                                    <div class="desk-seat" data-desk="0"></div>
                                </div>
                                <div class="desk">
                                    <div class="desk-seat" data-desk="1"></div>
                                </div>
                            </div>
                        </div>
                    </button>
                    <button type="button" class="pod-option" data-pod-size="4" aria-pressed="false" title="Pod size 4">
                        <div class="seat">
                            <div class="pod pod-square">
                                <div class="desk">
                                    <div class="desk-seat" data-desk="0"></div>
                                </div>
                                <div class="desk">
                                    <div class="desk-seat" data-desk="1"></div>
                                </div>
                                <div class="desk">
                                    <div class="desk-seat" data-desk="2"></div>
                                </div>
                                <div class="desk">
                                    <div class="desk-seat" data-desk="3"></div>
                                </div>
                            </div>
                        </div>
                    </button>
                </div>
            </div>
            <div>
                <button type="button" class="hidden btn-secondary" id="print" title="Print">🖨️ Print</button>
            </div>
        </div>

        <div id="chartWrapper" class="panel hidden">
            <div id="dragLabel">Drag and drop to rearrange desks.</div>
            <div id="boardLabel">Board</div>
            <div id="chart" class="chart"></div>
        </div>

        <div class="align-right">
            <button type="button" class="hidden btn-secondary print-bottom" id="printBottom" title="Print">🖨️ Print</button>
        </div>
    </div>

    <div id="adsense-ad">AdSense Ad Placeholder</div>

    <script src="app.js"></script>
</body>

</html>
