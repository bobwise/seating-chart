<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Free Seating Chart Generator</title>
    <link rel="stylesheet" href="styles.css">
    </head>

<body>
    <div class="app">
        <h1>Free Seating Chart Generator</h1>

        <div class="panel controls">
            <label>Rows <input id="rows" type="number" min="1" max="8" value="4"></label>
            <label>Cols <input id="cols" type="number" min="1" max="8" value="4"></label>
            <label>Pod size <input id="podSize" type="number" min="1" max="4" value="2"></label>
            <button id="go">Go</button>
            <button id="sort">Sort</button>
            <button id="shuffle">Shuffle</button>
            <button id="print">Print</button>
        </div>

        <div class="panel">
            <label for="names">Names (comma or newline separated)</label>
            <textarea id="names" placeholder="Alice, Bob, Charlie\nDenise"></textarea>
        </div>

        <div id="chartWrapper" class="panel">
            <div id="chart" class="chart"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
