<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Free Seating Chart Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app">
        <h1>Free Seating Chart Generator</h1>

        <div class="panel">
            <label for="names">Names</label>
            <textarea id="names"></textarea>
        </div>

        <div class="panel controls">
            <div>
                <button id="go">Go</button>
                <button class="hidden" id="clear">Clear</button> 
            </div>
            <div>
                <label class="hidden">Rows <input id="rows" type="number" min="1" max="8" value="1"></label>
                <label class="hidden">Columns <input id="cols" type="number" min="1" max="8" value="1"></label>
                <label class="hidden">Pod size <input id="podSize" type="number" min="1" max="4" value="1"></label>
            </div>
            <div>
                <button class="hidden" id="shuffle">Shuffle</button>
                <button class="hidden" id="print">Print</button>
            </div>
        </div>

        <div id="chartWrapper" class="panel hidden">
            <div id="chart" class="chart"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
